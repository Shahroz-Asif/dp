server.port=8081

# PostgreSQL — values come from environment variables (with local-dev defaults)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/recipemaker}
spring.datasource.username=${DATABASE_USERNAME:recipemaker}
spring.datasource.password=${DATABASE_PASSWORD:recipemaker}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# HikariCP — retry connecting long enough for docker-compose healthcheck to pass
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
